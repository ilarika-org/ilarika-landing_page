      <path d="M333 346c1 11 9 14 15 5" fill="#fff8ed"/>
      <path d="M314 352c9 7 22 6 30-2" fill="none" stroke="#ffb092" stroke-width="3" stroke-linecap="round" opacity=".75"/>

      <path d="M306 427c2 20 17 30 36 26 16-3 17-23 3-33-15-11-36-8-39 7Z" fill="#e9681f" stroke="#ad4217" stroke-width="3"/>
      <path d="M320 445c8 4 16 4 24-1" fill="none" stroke="#933115" stroke-width="3.5" stroke-linecap="round" opacity=".65"/>
    </g>

    <g id="i-body">
      <g transform="translate(140 35) scale(2.5)">
        <path d="M 29.0 62.0 C 30.0 61.8, 37.9 61.8, 39.0 62.0 C 40.1 62.2, 47.2 64.5, 48.0 65.0 C 48.8 65.5, 52.6 70.2, 53.0 71.0 C 53.4 71.8, 55.0 78.7, 55.0 80.0 C 55.0 81.3, 53.1 91.8, 53.0 94.0 C 52.9 96.2, 52.8 116.7, 53.0 119.0 C 53.2 121.3, 55.8 133.4, 56.0 135.0 C 56.2 136.6, 56.2 145.9, 56.0 147.0 C 55.8 148.1, 52.3 154.5, 52.0 155.0 C 51.7 155.5, 50.1 154.9, 50.0 155.0 C 49.9 155.1, 50.6 156.7, 50.0 157.0 C 49.4 157.3, 41.2 160.8, 40.0 161.0 C 38.8 161.2, 29.1 161.2, 28.0 161.0 C 26.9 160.8, 20.7 158.4, 20.0 158.0 C 19.3 157.6, 16.4 154.6, 16.0 154.0 C 15.6 153.4, 13.2 148.1, 13.0 147.0 C 12.8 145.9, 12.8 136.5, 13.0 135.0 C 13.2 133.5, 15.8 123.5, 16.0 121.0 C 16.2 118.5, 16.1 93.3, 16.0 91.0 C 15.9 88.7, 13.9 82.3, 14.0 81.0 C 14.1 79.7, 17.6 68.9, 18.0 68.0 C 18.4 67.1, 20.4 65.3, 21.0 65.0 C 21.6 64.7, 28.0 62.2, 29.0 62.0 Z" fill="url(#iGradient)" stroke="url(#iEdge)" stroke-width="2.8" stroke-linejoin="round"/>
