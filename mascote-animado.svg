<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">iLarika monstrinho animado</title>
  <desc id="desc">Letra i laranja com pingo mordido e monstrinho laranja fofo saindo por tras, com olhos piscando e migalhas animadas.</desc>
  <defs>
    <linearGradient id="iGradient" x1="196" y1="58" x2="251" y2="452" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffd34c"/>
      <stop offset=".38" stop-color="#ff9f2d"/>
      <stop offset="1" stop-color="#f36a18"/>
    </linearGradient>
    <linearGradient id="iEdge" x1="180" y1="80" x2="288" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#c4611b"/>
      <stop offset="1" stop-color="#a84414"/>
    </linearGradient>
    <radialGradient id="monsterGradient" cx="34%" cy="22%" r="82%">
      <stop offset="0" stop-color="#ffd05a"/>
      <stop offset=".36" stop-color="#ff9c31"/>
      <stop offset=".74" stop-color="#f37723"/>
      <stop offset="1" stop-color="#c74d18"/>
    </radialGradient>
    <radialGradient id="cheekGradient" cx="40%" cy="35%" r="66%">
      <stop offset="0" stop-color="#ffd3bb" stop-opacity=".95"/>
      <stop offset=".58" stop-color="#ff7165" stop-opacity=".82"/>
      <stop offset="1" stop-color="#ff5447" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="furLine" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ffbc45"/>
      <stop offset="1" stop-color="#b74716"/>
    </linearGradient>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="170%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="5"/>
      <feOffset dx="0" dy="8" result="offset"/>
      <feColorMatrix in="offset" type="matrix" values="0 0 0 0 .32 0 0 0 0 .11 0 0 0 0 .04 0 0 0 .28 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      #main-shadow {
        animation: shadow-breathe 3.4s ease-in-out infinite;
        transform-origin: 250px 452px;
      }

      #monster {
        animation: monster-peek 3.4s ease-in-out infinite;
        transform-origin: 312px 332px;
      }

      #i-body {
        animation: i-breathe 3.4s ease-in-out infinite;
        transform-origin: 226px 314px;
      }

      #i-dot {
        animation: dot-wobble 3.4s ease-in-out infinite;
        transform-origin: 225px 114px;
      }

      #tufts {
        animation: tuft-wiggle 3.4s ease-in-out infinite;
        transform-origin: 322px 198px;
      }

      #front-arm {
        animation: hug-squeeze 3.4s ease-in-out infinite;
        transform-origin: 275px 344px;
      }

      .eye-open {
        animation: blink-open 4.6s infinite;
        transform-box: fill-box;
        transform-origin: center;
      }

      .eye-closed {
        animation: blink-closed 4.6s infinite;
        opacity: 0;
      }

      .pupil {
        animation: glance 5.2s ease-in-out infinite;
      }

      .crumb {
        animation: crumb-float 3.4s ease-out infinite;
        opacity: 0;
        transform-origin: center;
      }

      .crumb.c2 { animation-delay: .12s; }
      .crumb.c3 { animation-delay: .22s; }
      .crumb.c4 { animation-delay: .34s; }
      .crumb.c5 { animation-delay: .48s; }

      .fur-stroke {
        fill: none;
        stroke: url(#furLine);
        stroke-linecap: round;
        stroke-width: 3.6;
        opacity: .42;
      }

      @keyframes monster-peek {
        0%, 100% { transform: translate(14px, 10px) rotate(1deg); }
        42% { transform: translate(0, -5px) rotate(-1.6deg); }
        72% { transform: translate(4px, -1px) rotate(.8deg); }
      }

      @keyframes i-breathe {
        0%, 100% { transform: translateY(0) scaleY(1); }
        42% { transform: translateY(-3px) scaleY(1.008); }
        72% { transform: translateY(-1px) scaleY(1.003); }
      }

      @keyframes dot-wobble {
        0%, 100% { transform: translateY(0) rotate(0deg); }
        42% { transform: translateY(-5px) rotate(-4deg); }
        72% { transform: translateY(-2px) rotate(2deg); }
      }

      @keyframes hug-squeeze {
        0%, 100% { transform: rotate(0deg) translateX(0); }
        42% { transform: rotate(-5deg) translateX(-3px); }
        72% { transform: rotate(2deg) translateX(-1px); }
      }

      @keyframes tuft-wiggle {
        0%, 100% { transform: rotate(0deg); }
        42% { transform: rotate(5deg); }
        72% { transform: rotate(-3deg); }
      }

      @keyframes blink-open {
        0%, 8%, 11%, 67%, 70%, 100% { transform: scaleY(1); }
        9.4%, 68.5% { transform: scaleY(.08); }
      }

      @keyframes blink-closed {
        0%, 8%, 11%, 67%, 70%, 100% { opacity: 0; }
        9.4%, 68.5% { opacity: 1; }
      }

      @keyframes glance {
        0%, 32%, 100% { transform: translateX(0); }
        46%, 62% { transform: translateX(4px); }
        78%, 88% { transform: translateX(-3px); }
      }

      @keyframes crumb-float {
        0%, 28% { opacity: 0; transform: translate(0, 0) scale(.55); }
        42% { opacity: 1; transform: translate(var(--tx), var(--ty)) scale(1); }
        68% { opacity: .5; transform: translate(calc(var(--tx) * 1.4), calc(var(--ty) * 1.25 - 4px)) scale(.82); }
        86%, 100% { opacity: 0; transform: translate(calc(var(--tx) * 1.8), calc(var(--ty) * 1.6 - 8px)) scale(.45); }
      }

      @keyframes shadow-breathe {
        0%, 100% { transform: scaleX(1); opacity: .35; }
        42% { transform: scaleX(.9); opacity: .22; }
      }

      @media (prefers-reduced-motion: reduce) {
        *, *::before, *::after {
          animation-duration: .001ms !important;
          animation-iteration-count: 1 !important;
        }
      }
    </style>
  </defs>

  <ellipse id="main-shadow" cx="256" cy="455" rx="92" ry="18" fill="#763018" opacity=".35"/>

  <g filter="url(#softShadow)">
    <g id="i-dot">
