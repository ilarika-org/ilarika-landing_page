          <ellipse class="eye-open" cx="342" cy="298" rx="14" ry="19" fill="#6a2815"/>
          <ellipse class="pupil" cx="340" cy="300" rx="8" ry="12" fill="#25100b"/>
          <circle cx="334" cy="286" r="5" fill="#fff"/>
          <circle cx="344" cy="306" r="2.4" fill="#fff4dc"/>
