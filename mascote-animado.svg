        </g>
      </g>

      <path d="M286 254c8-8 25-7 32 2 4 5 2 12-5 12-12 0-23-3-29-7-4-3-2-5 2-7Z" fill="#9d2b13"/>
      <path d="M354 265c9-4 23 2 28 13 3 7-4 12-11 9-12-5-20-12-23-17-2-4 1-5 6-5Z" fill="#9d2b13"/>

      <ellipse cx="284" cy="319" rx="22" ry="17" fill="url(#cheekGradient)"/>
      <ellipse cx="365" cy="332" rx="25" ry="19" fill="url(#cheekGradient)"/>
      <path d="M289 333c8 20 37 29 57 10" fill="none" stroke="#4c150b" stroke-width="4" stroke-linecap="round"/>
