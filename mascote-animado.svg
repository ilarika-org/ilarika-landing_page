      <path class="fur-stroke" d="M394 338c-10 34-28 59-55 75"/>
      <path class="fur-stroke" d="M261 283c-14 29-18 60-12 93"/>
      <path class="fur-stroke" d="M271 397c18 22 39 32 64 31"/>

      <g id="eyes">
        <g transform="rotate(-14 293 277)">
          <ellipse class="eye-open" cx="293" cy="277" rx="25" ry="31" fill="#fff8ed"/>
          <ellipse class="eye-open" cx="300" cy="284" rx="14" ry="19" fill="#6a2815"/>
          <ellipse class="pupil" cx="302" cy="286" rx="8" ry="12" fill="#25100b"/>
