        <path d="M 29.0 9.0 C 30.0 8.7, 34.7 8.7, 35.0 9.0 C 35.3 9.3, 33.8 13.5, 34.0 14.0 C 34.2 14.5, 37.8 17.4, 38.0 18.0 C 38.2 18.6, 37.8 23.5, 38.0 24.0 C 38.2 24.5, 40.5 26.8, 41.0 27.0 C 41.5 27.2, 46.7 27.8, 47.0 28.0 C 47.3 28.2, 46.7 29.7, 47.0 30.0 C 47.3 30.3, 51.4 33.8, 52.0 34.0 C 52.6 34.2, 57.7 32.5, 58.0 33.0 C 58.3 33.5, 57.5 41.0, 57.0 42.0 C 56.5 43.0, 49.6 49.5, 49.0 50.0 C 48.4 50.5, 46.2 50.2, 46.0 50.0 C 45.8 49.8, 45.3 46.3, 45.0 46.0 C 44.7 45.7, 40.4 44.9, 40.0 45.0 C 39.6 45.1, 38.2 46.5, 38.0 47.0 C 37.8 47.5, 37.3 52.6, 37.0 53.0 C 36.7 53.4, 33.3 54.3, 33.0 54.0 C 32.7 53.7, 31.3 48.5, 31.0 48.0 C 30.7 47.5, 28.4 45.1, 28.0 45.0 C 27.6 44.9, 24.4 45.7, 24.0 46.0 C 23.6 46.3, 21.7 51.2, 21.0 51.0 C 20.3 50.8, 12.6 43.0, 12.0 42.0 C 11.4 41.0, 9.9 34.2, 10.0 33.0 C 10.1 31.8, 12.5 21.0, 13.0 20.0 C 13.5 19.0, 17.7 16.3, 18.0 16.0 C 18.3 15.7, 17.4 14.4, 18.0 14.0 C 18.6 13.6, 28.0 9.3, 29.0 9.0 Z" fill="#ffd35a" opacity=".22"/>
      </g>
    </g>

    <g id="monster">
      <path d="M298 198c22-8 49-3 70 15 28 24 39 64 31 111-8 52-39 96-78 110-42 15-81-5-93-47-13-46 3-113 36-152 8-9 19-24 34-37Z" fill="url(#monsterGradient)" stroke="#b84b18" stroke-width="4"/>
      <g id="tufts">
